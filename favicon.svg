<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0d1a2d"/>

  <!-- Trophy cup body -->
  <path d="M22 14 h20 l-3 18 a9 9 0 0 1-14 0 Z" fill="#e8b400" opacity="0.95"/>

  <!-- Trophy handles -->
  <path d="M22 17 Q14 17 14 24 Q14 30 22 30" fill="none" stroke="#e8b400" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M42 17 Q50 17 50 24 Q50 30 42 30" fill="none" stroke="#e8b400" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Trophy stem -->
  <rect x="29" y="32" width="6" height="8" rx="1" fill="#c99800"/>

  <!-- Trophy base -->
  <rect x="22" y="40" width="20" height="4" rx="2" fill="#e8b400"/>
  <rect x="25" y="44" width="14" height="2.5" rx="1.25" fill="#c99800"/>

  <!-- Shine highlight on cup -->
  <path d="M26 17 Q27 22 26 27" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round"/>

  <!-- Star sparkle top left -->
  <g fill="#f5d040" opacity="0.9">
    <polygon points="10,10 11.2,13.5 14.5,13.5 11.9,15.5 12.8,19 10,17 7.2,19 8.1,15.5 5.5,13.5 8.8,13.5" transform="scale(0.55) translate(8,4)"/>
  </g>
  <!-- Small star top right -->
  <g fill="#f5d040" opacity="0.7">
    <polygon points="52,8 52.8,10.5 55,10.5 53.3,11.9 53.9,14.5 52,13.1 50.1,14.5 50.7,11.9 49,10.5 51.2,10.5" transform="scale(0.7) translate(22,-2)"/>
  </g>
</svg>
