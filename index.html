// Cols order for Annex C: 1A,1B,1D,1E,1G,1I,1K,1L
const ANNEX_COLS=['A','B','D','E','G','I','K','L'];
function lookupAnnexC(qualGroups){
  // qualGroups: array of 8 group letters (e.g. ['A','B','C','D','F','G','H','K'])
  const key=qualGroups.slice().sort().join('');
  const val=ANNEX_C[key];
  if(!val)return null;
  // Returns mapping: winnerGroup -> opponentGroup (3rd-place)
  const map={};
  ANNEX_COLS.forEach((col,i)=>map[col]=val[i]);
  return map;
}
function qualifiers(gTips={}){
  const q={},thirds=[];
  Object.keys(GRP).forEach(g=>{
    const st=standings(g,gTips[g]||{});
    q[g+'1']=st[0]?.team;q[g+'2']=st[1]?.team;
    if(st[2])thirds.push({...st[2],team:st[2].team,grp:g});
  });
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const top8=thirds.slice(0,8);
  const top8groups=top8.map(x=>x.grp);
  // Map team by group for quick lookup
  const thirdByGroup=Object.fromEntries(thirds.map(x=>[x.grp,x.team]));
  // Use Annex C to assign correct 3rd-place team to each 1st-place slot
  const annexMap=lookupAnnexC(top8groups);
  if(annexMap){
    // annexMap[col] = group letter of the 3rd-place opponent for winner of group col
    ANNEX_COLS.forEach(col=>{
      const oppGroup=annexMap[col];
      q['T_'+col]=thirdByGroup[oppGroup]||'?';
    });
  } else {
    // Fallback: assign by rank if combo not found (shouldn't happen)
    top8.forEach((x,i)=>q['T'+(i+1)]=x.team);
  }
  return q;
}
const rt=(src,q,kw)=>!src?'?':src.startsWith('W:')?kw?.[src.slice(2)]||'?':src.startsWith('L:')?kw?.['L:'+src.slice(2)]||'?':q?.[src]||'?';
function koWinners(koScores={},q={}){
  const w={};
  KO.forEach(m=>{
    const s=koScores?.[m.id];
    const t1=rt(m.t1,q,w),t2=rt(m.t2,q,w);
    const done=s&&s.h!=null&&s.h!==''&&s.a!=null&&s.a!==''&&!isNaN(+s.h)&&!isNaN(+s.a)&&+s.h!==+s.a;
    const winner=done?(+s.h>+s.a?t1:t2):null;
    const loser=done?(+s.h>+s.a?t2:t1):null;
    if(winner&&winner!=='?')w[m.id]=winner;
    if(loser&&loser!=='?')w['L:'+m.id]=loser;
  });
  return w;
}
function mpts(tip,real){
  if(!tip||!real||tip.h==null||tip.h===''||tip.a==null||tip.a==='')return 0;
  if(real.h==null||real.a==null)return 0;
  const tH=+tip.h,tA=+tip.a,rH=+real.h,rA=+real.a;
  if(tH===rH&&tA===rA)return 3;
  if(Math.sign(tH-tA)===Math.sign(rH-rA))return 1;
  return 0;

function score(ut,rGR,rKR,rKS){

  const rQ=qualifiers(rGR||{}),uQ=qualifiers(ut.groupTips||{});
  const uKW=koWinners(ut.koScores||{},uQ);
  Object.keys(GRP).forEach(g=>gms(g).forEach(({id})=>{const x=mpts(ut.groupTips?.[g]?.[id],rGR?.[g]?.[id]);p+=x;bd.g+=x}));
  KO.forEach(m=>{
    const uS=ut.koScores?.[m.id],rW=rKR?.[m.id];
    const uT1=rt(m.t1,uQ,uKW),uT2=rt(m.t2,uQ,uKW);
    const uW=uS&&uS.h!=null&&uS.a!=null&&+uS.h!==+uS.a?(+uS.h>+uS.a?uT1:uT2):null;
    if(uW&&rW&&uW===rW){
      p+=RP[m.r];bd.k+=RP[m.r];
      const rT1=rt(m.t1,rQ,rKR||{}),rT2=rt(m.t2,rQ,rKR||{});
      if(uT1===rT1&&uT2===rT2&&uT1!=='?'&&rT1!=='?'){p++;bd.b++}

    const x=mpts(uS,rKS?.[m.id]);p+=x;bd.s+=x;

async function syncAPI(key){
  const r=await fetch('https://api.football-data.org/v4/competitions/WC/matches?season=2026',{headers:{'X-Auth-Token':key}});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const d=await r.json();
  if(d.error||d.message&&d.message!=='')throw new Error(d.message||d.error);
  const fx=d.matches||[],rG={},rK={},rS={};
  const fdName=n=>A2D[n]||n;
  fx.forEach(f=>{
    if(f.status!=='FINISHED')return;
    const hD=fdName(f.homeTeam?.name),aD=fdName(f.awayTeam?.name);
    const gH=f.score?.fullTime?.home,gA=f.score?.fullTime?.away;
    const rH=f.score?.regularTime?.home??gH,rA=f.score?.regularTime?.away??gA;
    const wD=f.score?.winner==='HOME_TEAM'?hD:f.score?.winner==='AWAY_TEAM'?aD:null;
    if(!hD||!aD)return;
    let isGroup=false;
    Object.keys(GRP).forEach(g=>gms(g).forEach(m=>{
      if(m.home===hD&&m.away===aD){if(!rG[g])rG[g]={};rG[g][m.id]={h:gH,a:gA};isGroup=true}
      else if(m.home===aD&&m.away===hD){if(!rG[g])rG[g]={};rG[g][m.id]={h:gA,a:gH};isGroup=true}
    }));
    if(!isGroup&&wD){
      rK[hD+'__'+aD]=wD;rK[aD+'__'+hD]=wD;
      rS[hD+'__'+aD]={h:rH,a:rA};rS[aD+'__'+hD]={h:rA,a:rH};
    }
  });
  const rQ=qualifiers(rG),ko={},ks={};
  ['R32','R16','QF','SF','THIRD','FINAL'].forEach(rnd=>KO.filter(m=>m.r===rnd).forEach(m=>{
    const t1=rt(m.t1,rQ,ko),t2=rt(m.t2,rQ,ko),k=t1+'__'+t2;
    if(rK[k]){ko[m.id]=rK[k];ko['L:'+m.id]=rK[k]===t1?t2:t1;ks[m.id]=rS[k]}
  }));
  return{rG,rK:ko,rS:ks,n:fx.length,gn:Object.values(rG).reduce((n,g)=>n+Object.keys(g).length,0),kn:Object.keys(ko).filter(k=>!k.startsWith('L:')).length};
}

  surface:'#0d1a2d',
  card:'#0f1f35',
  cardHover:'#132540',
  border:'#1a3050',
  borderLight:'#213d62',
  gold:'#e8b400',
  goldDim:'rgba(232,180,0,0.12)',
  goldText:'#f0c820',
  blue:'#2d7dd2',
  blueDim:'rgba(45,125,210,0.12)',
  text:'#cfe2f3',
  textDim:'#6b90b8',
  textMuted:'#3d6080',
  green:'#2ecc71',
  greenDim:'rgba(46,204,113,0.12)',
  red:'#e74c3c',
  redDim:'rgba(231,76,60,0.12)',
  amber:'#f39c12',
  amberDim:'rgba(243,156,18,0.12)',
};

// ── Shared components ──
const Badge=({pts,label,sm})=>{
  const good=pts>0;
  return <span style={{fontSize:sm?9:10,fontWeight:700,padding:sm?'1px 5px':'2px 7px',borderRadius:4,
    background:good?T.greenDim:T.redDim,color:good?T.green:T.red,whiteSpace:'nowrap',lineHeight:1.4}}>
    {label&&<span style={{opacity:.7}}>{label} </span>}{good?'+'+pts:pts}p {pts===3?'✓✓':good?'✓':'✗'}
  </span>;
};

const Pill=({children,color=T.textMuted,bg='transparent',border=T.border})=>
  <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:bg,color,border:'1px solid '+border,whiteSpace:'nowrap',fontWeight:600}}>{children}</span>;

const GoalInput=({val,onChange,disabled})=>{
  const n=(val===''||val==null)?null:(isNaN(+val)?null:+val);
  const on=n!==null;
  return <div className="gi-wrap">
    <button className="gi-btn l" disabled={disabled} onMouseDown={e=>e.preventDefault()}
      onClick={()=>!disabled&&on&&n>0&&onChange(n-1)}
      style={{opacity:disabled?undefined:on&&n>0?1:.3}}>−</button>
    <input type="text" inputMode="numeric" className={'gi-inp'+(on&&!disabled?' on':'')}
      value={on?String(n):''}
      onChange={e=>{if(disabled)return;const v=e.target.value;if(v===''){onChange('');return}const p=parseInt(v,10);if(!isNaN(p)&&p>=0&&p<=20)onChange(p)}}
      disabled={disabled}/>
    <button className="gi-btn r" disabled={disabled} onMouseDown={e=>e.preventDefault()}
      onClick={()=>!disabled&&onChange(on?n+1:0)}>+</button>
  </div>;
};

const LockBar=()=>
  <div style={{display:'flex',alignItems:'center',gap:10,background:T.redDim,border:'1px solid rgba(231,76,60,.25)',borderRadius:10,padding:'10px 14px',marginBottom:16}}>
    <span style={{fontSize:20}}>🔒</span>
    <div>
      <div style={{color:T.red,fontWeight:700,fontSize:13}}>Tipps geschlossen</div>
      <div style={{color:T.textDim,fontSize:11,marginTop:1}}>Abgabe war bis 11. Juni · 21:00 Uhr MESZ möglich.</div>
    </div>
  </div>;

const DateBadge=({d,t})=>d&&t?
  <span style={{fontSize:10,color:T.textMuted,fontWeight:500}}>{d} · {t}</span>:null;
const todayDM=()=>new Date().toLocaleDateString('de-DE',{timeZone:'Europe/Berlin',day:'2-digit',month:'2-digit'});
const tipDone=s=>s&&s.h!=null&&s.h!==''&&s.a!=null&&s.a!=='';
const pairOk=(a,b,c,d)=>a&&b&&c&&d&&a!=='?'&&b!=='?'&&c!=='?'&&d!=='?'&&((a===c&&b===d)||(a===d&&b===c));

// ── Standings ──
const Standings=({group,st})=>
  <div style={{background:T.card,borderRadius:12,marginBottom:14,overflow:'hidden',border:'1px solid '+T.border}}>
    <div style={{padding:'10px 14px',borderBottom:'1px solid '+T.border,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <span style={{color:T.goldText,fontWeight:800,fontSize:12,letterSpacing:2}}>GRUPPE {group}</span>
      <span style={{fontSize:10,color:T.textMuted}}>aus deinen Tipps</span>
    </div>
    <div style={{overflowX:'auto'}}>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,minWidth:280}}>
      <thead><tr style={{background:'#091528'}}>
        {['#','Team','Sp','S','U','N','Tore','±','Pkt'].map((h,i)=>(
          <th key={i} style={{padding:'6px 4px',textAlign:i<2?'left':'center',color:T.textMuted,fontWeight:600,fontSize:10,whiteSpace:'nowrap'}}>{h}</th>
        ))}
      </tr></thead>
      <tbody>{st.map((r,i)=>{
        const qual=i<2,third=i===2;
        return <tr key={r.team} style={{borderTop:'1px solid '+T.border,background:qual?'rgba(232,180,0,.025)':'transparent'}}>
          <td style={{padding:'9px 6px',width:20}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:qual?T.goldText:third?T.textMuted:T.border,margin:'0 auto'}}/>
          </td>
          <td style={{padding:'9px 4px'}}>
            <span style={{display:'flex',alignItems:'center',gap:6,fontWeight:600,color:qual?T.text:T.textDim,fontSize:12}}>
              <Flag c={r.team} s={15}/>{r.team}
            </span>
          </td>
          {[r.w+r.d+r.l,r.w,r.d,r.l].map((v,j)=>(
            <td key={j} style={{textAlign:'center',padding:'9px 3px',color:[T.textDim,T.green,T.amber,T.red][j],fontSize:11}}>{v}</td>
          ))}
          <td style={{textAlign:'center',color:'#4a7090',fontSize:11}}>{r.gf}:{r.ga}</td>
          <td style={{textAlign:'center',color:r.gd>0?T.green:r.gd<0?T.red:T.textMuted,fontSize:11,fontWeight:600}}>{r.gd>0?'+':''}{r.gd}</td>
          <td style={{textAlign:'center',fontWeight:800,fontSize:14,color:qual?T.goldText:T.text,padding:'9px 8px'}}>{r.pts}</td>
        </tr>;
      })}</tbody>
    </table>
    </div>
  </div>;

// ── Match card ──
const MatchCard=({m,tip,real,onH,onA,locked})=>{
  const done=tip.h!=null&&tip.h!==''&&tip.a!=null&&tip.a!=='';
  const res=done?(+tip.h>+tip.a?'home':+tip.h<+tip.a?'away':'draw'):null;
  const pts=real&&done?mpts(tip,real):null;
  const sched=gs(m.home,m.away);
  let stripe=T.border;
  if(pts===3)stripe=T.green;else if(pts===1)stripe=T.amber;else if(pts===0&&real)stripe=T.red;
  else if(done)stripe=T.goldText;
  return <div style={{background:T.card,borderRadius:12,marginBottom:8,overflow:'hidden',border:'1px solid '+T.border}}>
    <div style={{width:'100%',height:3,background:stripe,transition:'background .2s'}}/>
    <div style={{padding:'10px 12px'}}>
      {sched&&<div style={{marginBottom:8}}><DateBadge d={sched.d} t={sched.t+' MESZ'}/></div>}
      {/* Row 1: Teams */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:6,flex:1,minWidth:0}}>
          <Flag c={m.home} s={22}/>
          <span style={{fontSize:13,fontWeight:700,color:res==='home'?T.goldText:T.text,lineHeight:1.2}}>{m.home}</span>
        </div>
        <span style={{color:T.textMuted,fontSize:11,fontWeight:600,flexShrink:0}}>vs</span>
        <div style={{display:'flex',alignItems:'center',gap:6,flex:1,minWidth:0,justifyContent:'flex-end'}}>
          <span style={{fontSize:13,fontWeight:700,color:res==='away'?T.goldText:T.text,lineHeight:1.2,textAlign:'right'}}>{m.away}</span>
          <Flag c={m.away} s={22}/>
        </div>
      </div>
      {/* Row 2: Score inputs centered */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:0}}>
        <GoalInput val={tip.h} onChange={onH} disabled={locked}/>
        <span style={{color:T.borderLight,fontWeight:900,fontSize:22,lineHeight:1,padding:'0 8px',flexShrink:0}}>:</span>
        <GoalInput val={tip.a} onChange={onA} disabled={locked}/>
      </div>
      {real&&<div style={{marginTop:10,paddingTop:10,borderTop:'1px solid '+T.border,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:11,color:T.textDim}}>Ergebnis <b style={{color:T.text}}>{real.h}:{real.a}</b></span>
        {done&&pts!==null&&<Badge pts={pts}/>}
      </div>}
    </div>
  </div>;
};

// ── Groups Tab ──
const GroupsTab=({group,setGroup,tips,updateTip,gtCount,realGR,locked,hideProgress})=>{
  const [view,setView]=useState('tips');
  const realG=realGR?.[group]||{};
  const hasReal=Object.keys(realG).length>0;
  const st=standings(group,(view==='real'?realG:tips[group])||{});
  const ms=gms(group),gTips=tips[group]||{};
  return <div>
    {locked&&<LockBar/>}
    {/* Progress */}
    {!hideProgress&&<div style={{background:T.card,borderRadius:10,padding:'12px 14px',marginBottom:14,border:'1px solid '+T.border}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
        <span style={{fontSize:12,color:T.textDim,fontWeight:600}}>⚽ Gruppen-Tipps</span>
        <span style={{fontSize:12,fontWeight:700,color:gtCount===72?T.green:T.goldText}}>{gtCount}/72{gtCount===72&&' ✓'}</span>
      </div>
      <div style={{height:4,background:T.surface,borderRadius:2}}>
        <div style={{height:'100%',background:gtCount===72?T.green:T.goldText,borderRadius:2,width:(gtCount/72*100)+'%',transition:'width .4s'}}/>
      </div>
    </div>}
    {/* Group picker */}
    {!hideProgress&&<div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
      {Object.keys(GRP).map(g=>(
        <button key={g} onClick={()=>setGroup(g)} style={{width:36,height:36,borderRadius:8,
          border:'1px solid '+(group===g?T.goldText:T.border),
          background:group===g?T.goldText:T.surface,
          color:group===g?'#060c18':T.textDim,fontWeight:700,fontSize:13,cursor:'pointer'}}>{g}</button>
      ))}
    </div>}
    {hasReal&&<div style={{display:'flex',gap:6,marginBottom:12}}>
      {[['tips','🎯 Meine Tipps'],['real','📊 Live-Tabelle']].map(([v,l])=>(
        <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:'8px 6px',borderRadius:8,
          border:'1px solid '+(view===v?T.goldText:T.border),
          background:view===v?T.goldDim:T.surface,
          color:view===v?T.goldText:T.textDim,fontWeight:600,fontSize:12,cursor:'pointer'}}>{l}</button>
      ))}
    </div>}
    <Standings group={group} st={st}/>
    {[1,2,3].map(md=>(
      <div key={md} style={{marginBottom:16}}>
        <div style={{color:T.textMuted,fontSize:10,fontWeight:700,letterSpacing:3,marginBottom:8,textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,height:1,background:T.border}}/>Spieltag {md}<div style={{flex:1,height:1,background:T.border}}/>
        </div>
        {ms.filter(m=>m.md===md).map(m=>(
          <MatchCard key={m.id} m={m} tip={gTips[m.id]||{}} real={realG[m.id]||null}
            onH={v=>updateTip(group,m.id,'h',v)} onA={v=>updateTip(group,m.id,'a',v)} locked={locked}/>
        ))}
      </div>
    ))}
  </div>;
};

// ── KO Tab ──
const KOTab=({koRound,setKoRound,koScores,q,updateKoScore,koScoreCount,rKR,rKS,locked,hideProgress})=>{
  const ms=KO.filter(m=>m.r===koRound);
  const kw=koWinners(koScores,q);
  return <div>
    {locked&&<LockBar/>}
    {!hideProgress&&<div style={{background:T.card,borderRadius:10,padding:'12px 14px',marginBottom:12,border:'1px solid '+T.border,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontSize:12,color:T.textDim,fontWeight:600}}>⚡ K.O.-Ergebnisse</span>
      <span style={{fontSize:14,fontWeight:800,color:koScoreCount===32?T.green:'#7aabcc'}}>{koScoreCount}/32{koScoreCount===32&&' ✓'}</span>
    </div>}
    {!hideProgress&&<div style={{display:'flex',gap:5,marginBottom:16,flexWrap:'wrap'}}>
      {KOR.map(r=>(
        <button key={r.id} onClick={()=>setKoRound(r.id)} style={{flex:'none',padding:'7px 11px',borderRadius:20,
          border:'1px solid '+(koRound===r.id?T.goldText:T.border),
          background:koRound===r.id?T.goldDim:T.surface,
          color:koRound===r.id?T.goldText:T.textDim,fontWeight:600,fontSize:11,cursor:'pointer'}}>{r.lbl}</button>
      ))}
    </div>}
    {koRound==='R32'&&<div style={{background:T.blueDim,border:'1px solid rgba(45,125,210,.25)',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:12,color:T.textDim,lineHeight:1.6}}>
      💡 Teams werden aus deinen Gruppen-Tipps befüllt. Tipp das Ergebnis nach 90 Min. — der Sieger ergibt sich automatisch.
    </div>}
    <div style={{display:'grid',gap:10}}>
      {ms.map(m=>{
        const t1=rt(m.t1,q,kw),t2=rt(m.t2,q,kw);
        const sc=koScores?.[m.id]||{},rW=rKR?.[m.id],rSc=rKS?.[m.id];
        const ok1=t1&&t1!=='?',ok2=t2&&t2!=='?';
        const h=sc.h!=null&&sc.h!==''?+sc.h:null,a=sc.a!=null&&sc.a!==''?+sc.a:null;
        const done=h!==null&&a!==null&&!isNaN(h)&&!isNaN(a);
        const draw=done&&h===a;
        const aw=done&&!draw?(h>a?t1:t2):null;
        const winText=m.r==='FINAL'?'gewinnt':m.r==='THIRD'?'gewinnt Platz 3':'kommt weiter';
        const sP=rSc&&done?mpts(sc,rSc):null;
        const wP=aw&&rW?(aw===rW?RP[m.r]:0):null;
        let top=T.border;
        if(draw)top=T.amber;
        else if(done)top=wP>0?T.green:wP===0&&rW?T.red:T.goldText;
        return <div key={m.id} style={{background:T.card,borderRadius:12,overflow:'hidden',border:'1px solid '+T.border}}>
          <div style={{height:3,background:top}}/>
          <div style={{padding:'12px 12px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <span style={{fontSize:10,color:T.textMuted,fontWeight:600,textTransform:'uppercase',letterSpacing:.5}}>{m.lbl}</span>
              <DateBadge d={m.d} t={m.t+' MESZ'}/>
            </div>
            {/* Teams row */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,gap:8}}>
              <div style={{display:'flex',alignItems:'center',gap:6,flex:1,minWidth:0}}>
                {ok1?<Flag c={t1} s={22}/>:<span style={{fontSize:20}}>❓</span>}
                <span style={{fontSize:13,fontWeight:700,color:T.text,lineHeight:1.2}}>{ok1?t1:'Unbekannt'}</span>
              </div>
              <span style={{color:T.textMuted,fontSize:11,fontWeight:600,flexShrink:0}}>vs</span>
              <div style={{display:'flex',alignItems:'center',gap:6,flex:1,minWidth:0,justifyContent:'flex-end'}}>
                <span style={{fontSize:13,fontWeight:700,color:T.text,lineHeight:1.2,textAlign:'right'}}>{ok2?t2:'Unbekannt'}</span>
                {ok2?<Flag c={t2} s={22}/>:<span style={{fontSize:20}}>❓</span>}
              </div>
            </div>
            {/* Score inputs centered */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:0,padding:'10px 0',background:T.surface,borderRadius:10,border:'1px solid '+(draw?T.amber:done?T.goldText:T.border)}}>
              <GoalInput val={sc.h!=null?sc.h:''} onChange={v=>updateKoScore(m.id,'h',v)} disabled={locked}/>
              <span style={{color:T.borderLight,fontWeight:900,fontSize:22,padding:'0 10px',flexShrink:0}}>:</span>
              <GoalInput val={sc.a!=null?sc.a:''} onChange={v=>updateKoScore(m.id,'a',v)} disabled={locked}/>
            </div>
            {draw&&<div style={{marginTop:8,padding:'7px 12px',background:T.amberDim,border:'1px solid rgba(243,156,18,.3)',borderRadius:8,fontSize:11,color:T.amber,fontWeight:600,textAlign:'center'}}>
              ⚠️ In der K.O.-Phase gibt es kein Unentschieden — bitte ein eindeutiges Ergebnis eingeben.
            </div>}
            {aw&&!draw&&<div style={{marginTop:8,display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:T.goldDim,borderRadius:8,border:'1px solid rgba(232,180,0,.2)'}}>
              <Flag c={aw} s={16}/>
              <span style={{fontSize:12,fontWeight:700,color:T.goldText,flex:1}}>{aw} {winText}</span>
              {wP!==null&&<Badge pts={wP} label="Sieg" sm/>}
            </div>}
            {(rW||rSc)&&<div style={{marginTop:8,paddingTop:8,borderTop:'1px solid '+T.border,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}}>
              <div style={{fontSize:11,color:T.textDim}}>
                {rSc&&<span>90' <b style={{color:T.text}}>{rSc.h}:{rSc.a}</b> </span>}
                {rW&&<span>Sieger <b style={{color:T.text}}>{rW}</b></span>}
              </div>
              <div style={{display:'flex',gap:4}}>
                {wP!==null&&<Badge pts={wP} label="Weiterkommen" sm/>}
                {sP!==null&&<Badge pts={sP} label="90'" sm/>}
              </div>
            </div>}
          </div>
        </div>;
      })}
    </div>
  </div>;
};

    <div style={{background:T.card,borderRadius:10,padding:'12px 14px',marginBottom:14,border:'1px solid '+T.border}}>

        <span style={{fontSize:12,color:T.textDim,fontWeight:600}}>🎯 Tipps</span>

      </div>
      <div style={{height:4,background:T.surface,borderRadius:2}}>
        <div style={{height:'100%',background:done===total?T.green:T.goldText,borderRadius:2,width:(done/total*100)+'%',transition:'width .4s'}}/>
      </div>
    </div>
    <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:10}}>
      {groups.map(g=><button key={g} onClick={()=>{setSection(g);setGroup(g)}} style={{width:36,height:36,borderRadius:8,
        border:'1px solid '+(section===g?T.goldText:T.border),background:section===g?T.goldText:T.surface,
        color:section===g?'#060c18':T.textDim,fontWeight:800,fontSize:13,cursor:'pointer'}}>{g}</button>)}
    </div>
    <div style={{display:'flex',flexWrap:'wrap',overflowX:'auto',gap:5,marginBottom:14,paddingBottom:2}}>
      {rounds.map(id=>{
        const lbl=KOR.find(r=>r.id===id)?.lbl||id,isOn=section===id;
        return <button key={id} onClick={()=>{setSection(id);setKoRound(id)}} style={{flex:'0 0 auto',height:34,padding:'0 11px',borderRadius:8,
          border:'1px solid '+(isOn?T.goldText:T.border),background:isOn?T.goldText:T.surface,
          color:isOn?'#060c18':T.textDim,fontWeight:800,fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>{lbl}</button>;
      })}

      ?<GroupsTab group={group} setGroup={g=>{setGroup(g);setSection(g)}} tips={tips.groupTips} updateTip={updG} gtCount={gtCount} realGR={rGR} locked={locked} hideProgress/>
      :<KOTab koRound={koRound} setKoRound={r=>{setKoRound(r);setSection(r)}} koScores={tips.koScores||{}} q={q} updateKoScore={updKS} koScoreCount={koSC} rKR={rKR} rKS={rKS} locked={locked} hideProgress/>}
  </div>;
};

// ── Leaderboard ──
const LeaderboardTab=({allUsers,allTips,me,rGR,rKR,rKS,onView})=>{
  const hasR=Object.keys(rGR||{}).length>0||Object.keys(rKR||{}).length>0;
  const rows=allUsers.map(u=>{const ut=allTips[u]||{groupTips:{},koScores:{}};return{u,sc:score(ut,rGR,rKR,rKS)}}).sort((a,b)=>b.sc.total-a.sc.total);
  const medals=['🥇','🥈','🥉'];
  return <div>
    <div style={{background:'linear-gradient(135deg,#0a1628 0%,#0e2040 100%)',borderRadius:16,padding:'28px 20px',marginBottom:20,textAlign:'center',border:'1px solid '+T.border}}>
      <div style={{fontSize:52,marginBottom:6}}>🏆</div>
      <div style={{color:T.goldText,fontWeight:900,fontSize:24,letterSpacing:4}}>RANGLISTE</div>
      {!hasR&&<div style={{color:T.textMuted,fontSize:12,marginTop:8}}>Punkte werden nach Spielen vergeben</div>}
    </div>
    {rows.length===0&&<div style={{textAlign:'center',color:T.textMuted,padding:'40px 16px',fontSize:13}}>Noch keine Mitspieler.<br/>Meldet euch mit Name + PIN an.</div>}
    {rows.map(({u,sc},i)=>(
      <div key={u} onClick={()=>onView(u)} style={{background:u===me?T.goldDim:T.card,
        border:'1px solid '+(u===me?'rgba(232,180,0,.3)':T.border),
        borderRadius:12,padding:'13px 14px',marginBottom:8,display:'flex',alignItems:'center',gap:12,cursor:'pointer',
        transition:'background .15s'}}>
        <div style={{width:38,height:38,borderRadius:'50%',flexShrink:0,
          background:i===0?T.goldText:i===1?'#8fa8c0':i===2?'#b07040':'#0e1f35',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:i<3?18:13,color:i<3?'#060c18':T.textDim,fontWeight:900}}>
          {i<3?medals[i]:i+1}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:14,color:T.text,display:'flex',alignItems:'center',gap:6}}>

                </span>
              </div>
              {real&&done&&pts!==null&&<div style={{marginTop:8,paddingTop:8,borderTop:'1px solid '+T.border,display:'flex',justifyContent:'space-between',fontSize:11}}>
                <span style={{color:T.textDim}}>Ergebnis <b style={{color:T.text}}>{real.h}:{real.a}</b></span>
                <Badge pts={pts} sm/>
              </div>}
            </div>
          </div>;
        })}
      </div>
    ))}
    <div style={{marginTop:20,color:T.goldText,fontWeight:800,fontSize:11,letterSpacing:3,marginBottom:12,textTransform:'uppercase'}}>⚡ K.O.-Tipps</div>
    {KOR.map(round=>{
      const picks=KO.filter(m=>m.r===round.id&&viewTips.koScores?.[m.id]);
      if(!picks.length)return null;
      return <div key={round.id} style={{marginBottom:14}}>
        <div style={{color:T.textMuted,fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:6,textTransform:'uppercase'}}>{round.lbl}</div>
        {picks.map(m=>{
          const s=viewTips.koScores[m.id];
          const rW=rKR?.[m.id],rSc=rKS?.[m.id];
          const sd=s?.h!=null&&s?.h!==''&&s?.a!=null&&s?.a!=='';
          const sp=rSc&&sd?mpts(s,rSc):null;
          const t1=rt(m.t1,vQ,vKW),t2=rt(m.t2,vQ,vKW);
          const aw=sd&&+s.h!==+s.a?(+s.h>+s.a?t1:t2):null;
          const ok=rW&&aw===rW,bad=rW&&aw&&aw!==rW;
          return <div key={m.id} style={{padding:'10px 14px',background:T.card,borderRadius:10,marginBottom:6,border:'1px solid '+(ok?'rgba(46,204,113,.3)':bad?'rgba(231,76,60,.3)':T.border)}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:10,color:T.textMuted,fontWeight:600}}>{m.lbl}</span>
              <DateBadge d={m.d} t={m.t+' MESZ'}/>
            </div>
            {sd&&<div style={{display:'flex',gap:8,alignItems:'center',marginBottom:aw?6:0}}>
              <span style={{flex:1,fontSize:11,color:T.textDim,textAlign:'right',display:'flex',alignItems:'center',justifyContent:'flex-end',gap:4}}>{t1!=='?'&&<Flag c={t1} s={13}/>}{t1}</span>
              <span style={{fontWeight:800,fontSize:14,color:T.goldText,background:T.surface,padding:'2px 10px',borderRadius:6,border:'1px solid '+T.border}}>{s.h}:{s.a}</span>
              <span style={{flex:1,fontSize:11,color:T.textDim,display:'flex',alignItems:'center',gap:4}}>{t2!=='?'&&<Flag c={t2} s={13}/>}{t2}</span>
            </div>}
            {aw&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:11}}>
              <span style={{color:T.textDim,display:'flex',alignItems:'center',gap:4}}>Weiter: {aw!=='?'&&<Flag c={aw} s={13}/>}<b style={{color:ok?T.green:bad?T.red:T.text}}>{aw}</b></span>
              <div style={{display:'flex',gap:4}}>
                {ok&&<Badge pts={RP[m.r]} label="Sieg" sm/>}
                {bad&&<Badge pts={0} label="Sieg" sm/>}
                {sp!==null&&<Badge pts={sp} label="90'" sm/>}
              </div>
            </div>}
          </div>;
        })}
      </div>;
    })}
  </div>;
};

// ── Admin Tab ──
const AdminTab=({apiKey,onSaveKey,onSync,syncing,syncMsg,rGR,rKR})=>{
  const [key,setKey]=useState(apiKey);
  const gC=Object.values(rGR||{}).reduce((n,g)=>n+Object.keys(g).length,0);
  const kC=Object.keys(rKR||{}).filter(k=>!k.startsWith('L:')).length;
  const sec={background:T.card,border:'1px solid '+T.border,borderRadius:12,padding:16,marginBottom:12};
  const head=(emoji,title)=><div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:4}}>{emoji} {title}</div>;
  const sub=txt=><div style={{color:T.textDim,fontSize:11,marginBottom:12,lineHeight:1.6}}>{txt}</div>;
  const inp={width:'100%',padding:'11px 14px',borderRadius:8,border:'1px solid '+T.border,background:T.surface,color:T.text,fontSize:14,boxSizing:'border-box',outline:'none',fontFamily:'inherit',marginBottom:8,appearance:'none'};
  const btn=(bg,col,dis)=>({width:'100%',padding:'11px',borderRadius:8,border:'none',fontWeight:700,fontSize:13,cursor:dis?'not-allowed':'pointer',background:dis?T.surface:bg,color:dis?T.textMuted:col,opacity:dis?.6:1});
  return <div>
    <div style={{background:'linear-gradient(135deg,#0a1628,#0e2040)',borderRadius:16,padding:'20px',marginBottom:16,textAlign:'center',border:'1px solid '+T.border}}>
      <div style={{fontSize:32}}>⚙️</div>
      <div style={{color:T.goldText,fontWeight:900,fontSize:17,letterSpacing:2,marginTop:6}}>ADMIN</div>
    </div>
    <div style={sec}>
      {head('🔑','football-data.org Token')}
      <div style={{color:T.textDim,fontSize:11,marginBottom:12,lineHeight:1.6}}>Free Plan: Worldcup, verzögerte Scores, 10 Requests/Minute.</div>
      <input type="password" placeholder="Key eingeben…" value={key} onChange={e=>setKey(e.target.value)}
        style={inp} onFocus={e=>e.target.style.borderColor=T.goldText} onBlur={e=>e.target.style.borderColor=T.border}/>
      <button onClick={()=>onSaveKey(key)} style={btn(T.goldText,'#060c18')}>Speichern</button>
    </div>
    <div style={sec}>
      {head('🔄','Ergebnisse synchronisieren')}
      {sub('Gespeichert: '+gC+' Gruppenspiele · '+kC+' K.O.-Spiele')}
      <button onClick={onSync} disabled={syncing||!apiKey} style={btn('#1a4a8a','#7aaeff',syncing||!apiKey)}>
        {syncing?'⏳ Synchronisiere…':'🔄 Jetzt synchronisieren'}
      </button>
      {syncMsg&&<div style={{marginTop:10,padding:'10px 12px',background:syncMsg.startsWith('✅')?T.greenDim:T.redDim,borderRadius:8,fontSize:12,color:syncMsg.startsWith('✅')?T.green:T.red,lineHeight:1.5}}>{syncMsg}</div>}
    </div>
    <div style={{padding:'12px 14px',background:T.surface,border:'1px solid '+T.border,borderRadius:10,fontSize:11,color:T.textDim,lineHeight:2}}>
      <div style={{fontWeight:700,color:T.text,marginBottom:4}}>ℹ️ Supabase ist aktiv</div>
      1. Jeder meldet sich mit Name + PIN an<br/>
      2. Tipps werden automatisch online gespeichert<br/>
      3. Rangliste und Tipps-Tab laden alle Mitspieler automatisch<br/>
      4. Ergebnisse: football-data.org Token + Sync → für alle speichern<br/>
      5. WM: <b style={{color:T.text}}>11. Juni – 19. Juli 2026 · Alle Zeiten MESZ</b>
    </div>
  </div>;
};

// ── Login ──
const Login=({name,setName,pin,setPin,onLogin,loginMsg,loginLoading})=>
  <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 50% 30%,#0d2040 0%,#060c18 70%)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div style={{background:T.card,border:'1px solid '+T.border,borderRadius:20,padding:'40px 28px',maxWidth:360,width:'100%',textAlign:'center',boxShadow:'0 30px 80px rgba(0,0,0,.8)'}}>
      <div style={{fontSize:56,marginBottom:8}}>🏆</div>
      <div style={{color:T.goldText,fontSize:30,fontWeight:900,letterSpacing:4,marginBottom:4}}>WM 2026</div>
      <div style={{color:T.textMuted,fontSize:13,marginBottom:6}}>Familien-Tippspiel</div>
      <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:32,padding:'10px 0'}}>
        <Flag c="USA" s={28}/><Flag c="Kanada" s={28}/><Flag c="Mexiko" s={28}/>
      </div>
      <input placeholder="Dein Name…" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&onLogin()} autoFocus
        style={{width:'100%',padding:'14px 16px',borderRadius:12,border:'2px solid '+T.border,background:T.surface,color:T.text,fontSize:16,boxSizing:'border-box',marginBottom:12,outline:'none',fontFamily:'inherit',transition:'border-color .2s'}}
        onFocus={e=>e.target.style.borderColor=T.goldText} onBlur={e=>e.target.style.borderColor=T.border}/>
      <input type="password" inputMode="numeric" placeholder="PIN…" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&onLogin()}
        style={{width:'100%',padding:'14px 16px',borderRadius:12,border:'2px solid '+T.border,background:T.surface,color:T.text,fontSize:16,boxSizing:'border-box',marginBottom:12,outline:'none',fontFamily:'inherit',transition:'border-color .2s'}}
        onFocus={e=>e.target.style.borderColor=T.goldText} onBlur={e=>e.target.style.borderColor=T.border}/>
      <button onClick={onLogin} disabled={!name.trim()||!pin.trim()||loginLoading}
        style={{width:'100%',padding:'15px',borderRadius:12,border:'none',background:name.trim()&&pin.trim()&&!loginLoading?T.goldText:T.surface,
          color:name.trim()&&pin.trim()&&!loginLoading?'#060c18':T.textMuted,fontSize:15,fontWeight:900,cursor:name.trim()&&pin.trim()&&!loginLoading?'pointer':'not-allowed',letterSpacing:2,fontFamily:'inherit',transition:'all .2s'}}>
        {loginLoading?'VERBINDE…':'EINLOGGEN →'}
      </button>
      {loginMsg&&<div style={{marginTop:12,fontSize:12,color:loginMsg.startsWith('✅')?T.green:T.red,fontWeight:700,lineHeight:1.5}}>{loginMsg}</div>}
      <div style={{color:T.textMuted,fontSize:11,marginTop:20,lineHeight:1.7}}>Beim ersten Login wird dein Profil erstellt.<br/>Auf anderen Geräten öffnest du es mit derselben PIN.</div>
    </div>
  </div>;

// ── Main App ──
function App(){
  const [user,setUser]=useState(null);
  const [userKey,setUserKey]=useState('');
  const [ni,setNi]=useState('');
  const [pin,setPin]=useState('');
  const [loginMsg,setLoginMsg]=useState('');
  const [loginLoading,setLoginLoading]=useState(false);
  const [tips,setTips]=useState({groupTips:{},koScores:{}});
  const [allUsers,setAllUsers]=useState([]);
  const [allTips,setAllTips]=useState({});
  const [tab,setTab]=useState(isLocked()?'current':'mytips');
  const [mySection,setMySection]=useState('A');
  const [group,setGroup]=useState('A');
  const [koRound,setKoRound]=useState('R32');
  const [viewUser,setViewUser]=useState(null);
  const [viewTips,setViewTips]=useState(null);
  const [rGR,setRGR]=useState({});
  const [rKR,setRKR]=useState({});
  const [rKS,setRKS]=useState({});
  const [apiKey,setApiKey]=useState(FD_KEY);
  const [saving,setSaving]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState('');
  const [locked,setLocked]=useState(isLocked());
  const sv=useRef(null);
  const normName=n=>String(n||'').trim().toLowerCase();
  const rowsToState=rows=>{
    const users=(rows||[]).map(p=>p.name);
    const map={};
    (rows||[]).forEach(p=>map[p.name]=p.tips||EMPTY_TIPS);
    setAllUsers(users);setAllTips(map);
    return{users,map};
  };
  const loadResults=async()=>{
    const rows=await sb('app_state?key=eq.results&select=value');
    const v=rows?.[0]?.value||{};
    setRGR(v.rGR||{});setRKR(v.rKR||{});setRKS(v.rKS||{});
  };
  const loadAll=async()=>{
    const rows=await sb('players?select=name,name_key,tips&order=created_at.asc');
    return rowsToState(rows);
  };
  const loadInitial=async()=>{
    try{
      await loadResults();
      const{map}=await loadAll();
      const s=LS.get('wm26_session');
      if(s?.value){
        const saved=JSON.parse(s.value);
        if(saved?.name&&map[saved.name]){
          setUser(saved.name);setUserKey(saved.name_key||normName(saved.name));setTips(map[saved.name]||EMPTY_TIPS);
        }
      }
    }catch(e){setLoginMsg('❌ Supabase nicht erreichbar: '+e.message)}
    const ak=LS.get('wm26_apikey');setApiKey(ak?.value||FD_KEY);
  };

  useEffect(()=>{
    loadInitial();
    const iv=setInterval(()=>setLocked(isLocked()),60000);
    return()=>clearInterval(iv);
  },[]);
  useEffect(()=>{if(tab==='leaderboard'||tab==='overview'||tab==='current')loadAll().catch(()=>{})},[tab]);
  useEffect(()=>{if(locked&&tab==='mytips')setTab('current')},[locked,tab]);

  const doLogin=async()=>{
    const n=ni.trim(),p=pin.trim();if(!n||!p)return;
    const key=normName(n);
    setLoginLoading(true);setLoginMsg('');
    try{
      let rows=await sb('players?name_key=eq.'+enc(key)+'&select=*');
      const hash=await pinHash(key,p);
      let player=rows?.[0];
      if(player){
        if(player.pin_hash!==hash)throw new Error('PIN stimmt nicht');
      }else{
        const created=await sb('players',{method:'POST',body:JSON.stringify({name:n,name_key:key,pin_hash:hash,tips:EMPTY_TIPS})});
        player=created?.[0];
      }
      setUser(player.name);setUserKey(player.name_key);setTips(player.tips||EMPTY_TIPS);
      LS.set('wm26_session',JSON.stringify({name:player.name,name_key:player.name_key}));
      setLoginMsg('✅ Eingeloggt');
      await loadAll();
    }catch(e){setLoginMsg('❌ '+(e.message.includes('duplicate')?'Name existiert schon, bitte nochmal einloggen.':e.message))}
    setLoginLoading(false);
  };
  const save=t=>{
    if(locked||!userKey)return;
    if(sv.current)clearTimeout(sv.current);
    sv.current=setTimeout(async()=>{
      setSaving(true);
      try{
        await sb('players?name_key=eq.'+enc(userKey),{method:'PATCH',body:JSON.stringify({tips:t,updated_at:new Date().toISOString()})});
        setAllTips(a=>({...a,[user]:t}));
      }catch(e){console.error(e)}
      setSaving(false);
    },400);
  };
  const updG=(g,mid,side,val)=>{
    if(locked)return;
    const t={...tips,groupTips:{...tips.groupTips,[g]:{...tips.groupTips?.[g],[mid]:{...tips.groupTips?.[g]?.[mid],[side]:val}}}};
    setTips(t);save(t);
  };
  const updKS=(id,side,val)=>{
    if(locked)return;
    const t={...tips,koScores:{...tips.koScores,[id]:{...tips.koScores?.[id],[side]:val}}};
    setTips(t);save(t);
  };
  const doSync=async()=>{
    if(!apiKey){setSyncMsg('❌ API-Key eingeben');return}
    setSyncing(true);setSyncMsg('');
    try{
      const{rG,rK,rS,n,gn,kn}=await syncAPI(apiKey);
      setRGR(rG);setRKR(rK);setRKS(rS);
      await sb('app_state?on_conflict=key',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=representation'},body:JSON.stringify({key:'results',value:{rGR:rG,rKR:rK,rKS:rS},updated_at:new Date().toISOString()})});
      setSyncMsg('✅ '+n+' Spiele · '+gn+' Gruppen · '+kn+' K.O.');
      await loadAll();
    }catch(e){setSyncMsg('❌ '+e.message)}
    setSyncing(false);
  };
  const saveKey=k=>{setApiKey(k);LS.set('wm26_apikey',k)};
  const loadView=async name=>{
    if(!name){setViewUser(null);setViewTips(null);return}
    setViewUser(name);
    if(allTips[name]){setViewTips(allTips[name]);return}
    const rows=await sb('players?name=eq.'+enc(name)+'&select=tips');
    setViewTips(rows?.[0]?.tips||EMPTY_TIPS);
  };

  const q=useMemo(()=>qualifiers(tips.groupTips),[tips.groupTips]);
  const gtCount=Object.values(tips.groupTips||{}).reduce((n,g)=>n+Object.values(g||{}).filter(m=>m?.h!=null&&m?.h!==''&&m?.a!=null&&m?.a!=='').length,0);
  const koSC=Object.keys(tips.koScores||{}).filter(id=>{const s=tips.koScores[id];return s?.h!=null&&s?.h!==''&&s?.a!=null&&s?.a!==''}).length;

  const TABS=locked
    ?[['current','📅','Aktuelle Spiele'],['leaderboard','🏅','Rangliste'],['overview','👀','Alle Tipps'],['admin','⚙️','Admin']]
    :[['mytips','🎯','Meine Tipps'],['leaderboard','🏅','Rangliste'],['overview','👀','Alle Tipps'],['admin','⚙️','Admin']];

  if(!user)return <Login name={ni} setName={setNi} pin={pin} setPin={setPin} onLogin={doLogin} loginMsg={loginMsg} loginLoading={loginLoading}/>;
  return <div style={{minHeight:'100vh',background:T.bg,color:T.text}}>
    {/* Header */}
    <div style={{background:T.card,borderBottom:'1px solid '+T.border,padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between',height:52,position:'sticky',top:0,zIndex:100,boxShadow:'0 4px 24px rgba(0,0,0,.6)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:20}}>🏆</span>
        <div>
          <div style={{color:T.goldText,fontWeight:900,fontSize:15,letterSpacing:1,lineHeight:1}}>WM 2026</div>
          <div style={{color:T.textMuted,fontSize:9,letterSpacing:2,textTransform:'uppercase'}}>Tippspiel</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {locked&&<div style={{background:T.redDim,borderRadius:20,padding:'3px 10px',fontSize:11,color:T.red,fontWeight:700}}>🔒 Gesperrt</div>}
        {saving&&<div style={{color:T.textMuted,fontSize:11}}>💾</div>}
        <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:20,padding:'4px 12px',fontSize:12,color:T.textDim,fontWeight:600}}>👤 {user}</div>
      </div>
    </div>
    {/* Tabs */}
    <div className="tab-bar" style={{background:'#080f1e',borderBottom:'1px solid '+T.border}}>
      {TABS.map(([id,icon,lbl])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:'none',padding:'0 14px',height:44,border:'none',background:'none',
          color:tab===id?T.goldText:T.textMuted,fontWeight:tab===id?700:500,fontSize:12,cursor:'pointer',
          borderBottom:'2px solid '+(tab===id?T.goldText:'transparent'),whiteSpace:'nowrap',transition:'color .15s'}}>
          {icon} {lbl}
        </button>
      ))}
    </div>
    {/* Content */}
    <div style={{padding:'14px 14px',paddingBottom:80,maxWidth:640,margin:'0 auto'}}>
      {tab==='mytips'&&!locked&&<MyTipsTab section={mySection} setSection={setMySection} group={group} setGroup={setGroup} koRound={koRound} setKoRound={setKoRound} tips={tips} updG={updG} updKS={updKS} gtCount={gtCount} koSC={koSC} rGR={rGR} rKR={rKR} rKS={rKS} q={q} locked={locked}/>}
      {tab==='current'&&<CurrentGamesTab allUsers={allUsers} allTips={allTips} rGR={rGR} rKR={rKR} rKS={rKS}/>}
      {tab==='leaderboard'&&<LeaderboardTab allUsers={allUsers} allTips={allTips} me={user} rGR={rGR} rKR={rKR} rKS={rKS} onView={u=>{loadView(u);setTab('overview')}}/>}
      {tab==='overview'&&<OthersTab allUsers={allUsers} allTips={allTips} viewUser={viewUser} viewTips={viewTips} onSelect={loadView} rGR={rGR} rKR={rKR} rKS={rKS}/>}
      {tab==='admin'&&<AdminTab apiKey={apiKey} onSaveKey={saveKey} onSync={doSync} syncing={syncing} syncMsg={syncMsg} rGR={rGR} rKR={rKR}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
