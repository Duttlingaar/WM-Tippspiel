// ── Helpers ──
const gms=g=>{const t=GRP[g];return PAIRS.map(([hi,ai],i)=>({id:i,home:t[hi],away:t[ai],md:MDS[i]}))};
function standings(g,tips={}){
  const t=GRP[g],s=Object.fromEntries(t.map(x=>[x,{pts:0,gf:0,ga:0,gd:0,w:0,d:0,l:0}]));
  gms(g).forEach(({id,home,away})=>{
    const tip=tips[id];if(!tip||tip.h==null||tip.h===''||tip.a==null||tip.a==='')return;
    const h=+tip.h,a=+tip.a;if(isNaN(h)||isNaN(a))return;
    s[home].gf+=h;s[home].ga+=a;s[home].gd+=h-a;s[away].gf+=a;s[away].ga+=h;s[away].gd+=a-h;
    if(h>a){s[home].pts+=3;s[home].w++;s[away].l++}
    else if(h===a){s[home].pts++;s[away].pts++;s[home].d++;s[away].d++}
    else{s[away].pts+=3;s[away].w++;s[home].l++}
  });
  return t.map(x=>({team:x,...s[x]})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.team.localeCompare(b.team));
}
function qualifiers(gTips={}){
  const q={},thirds=[];
  Object.keys(GRP).forEach(g=>{
    const st=standings(g,gTips[g]||{});
    q[g+'1']=st[0]?.team;q[g+'2']=st[1]?.team;
    if(st[2])thirds.push({...st[2],team:st[2].team});
  });
  thirds.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  thirds.slice(0,8).forEach((x,i)=>q['T'+(i+1)]=x.team);
  return q;
}
const rt=(src,q,kw)=>!src?'?':src.startsWith('W:')?kw?.[src.slice(2)]||'?':q?.[src]||'?';
function mpts(tip,real){
  if(!tip||!real||tip.h==null||tip.h===''||tip.a==null||tip.a==='')return 0;
  if(real.h==null||real.a==null)return 0;
  const tH=+tip.h,tA=+tip.a,rH=+real.h,rA=+real.a;
  if(tH===rH&&tA===rA)return 3;
  if(Math.sign(tH-tA)===Math.sign(rH-rA))return 1;
  return 0;
}
function score(ut,rGR,rKR,rKS){
  let p=0;const bd={g:0,k:0,s:0,b:0};
  const rQ=qualifiers(rGR||{}),uQ=qualifiers(ut.groupTips||{});
  Object.keys(GRP).forEach(g=>gms(g).forEach(({id})=>{const x=mpts(ut.groupTips?.[g]?.[id],rGR?.[g]?.[id]);p+=x;bd.g+=x}));
  KO.forEach(m=>{
    const uS=ut.koScores?.[m.id],rW=rKR?.[m.id];
    const uT1=rt(m.t1,uQ,{}),uT2=rt(m.t2,uQ,{});
    const uW=uS&&uS.h!=null&&uS.a!=null&&+uS.h!==+uS.a?(+uS.h>+uS.a?uT1:uT2):null;
    if(uW&&rW&&uW===rW){
      p+=RP[m.r];bd.k+=RP[m.r];
      const rT1=rt(m.t1,rQ,rKR||{}),rT2=rt(m.t2,rQ,rKR||{});
      if(uT1===rT1&&uT2===rT2&&uT1!=='?'&&rT1!=='?'){p++;bd.b++}
    }
    const x=mpts(uS,rKS?.[m.id]);p+=x;bd.s+=x;
  });
  return{total:p,bd};
}

// ── API ──
async function syncAPI(key){
  const r=await fetch('https://v3.football.api-sports.io/fixtures?league=1&season=2026',{headers:{'x-apisports-key':key}});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const d=await r.json();
  if(d.errors&&Object.keys(d.errors).length)throw new Error(Object.values(d.errors)[0]);
  const fx=d.response||[],rG={},rK={},rS={};
  fx.forEach(f=>{
    const st=f.fixture?.status?.short;
    if(!['FT','AET','PEN'].includes(st))return;
    const rnd=f.league?.round||'';
    const hD=A2D[f.teams?.home?.name],aD=A2D[f.teams?.away?.name];
    const gH=f.goals?.home,gA=f.goals?.away;
    const wD=f.teams?.home?.winner?hD:f.teams?.away?.winner?aD:null;
    if(!hD||!aD)return;
    if(rnd.startsWith('Group Stage')){
      Object.keys(GRP).forEach(g=>gms(g).forEach(m=>{
        if(m.home===hD&&m.away===aD){if(!rG[g])rG[g]={};rG[g][m.id]={h:gH,a:gA}}
        else if(m.home===aD&&m.away===hD){if(!rG[g])rG[g]={};rG[g][m.id]={h:gA,a:gH}}
      }));
    }else if(wD){
      rK[hD+'__'+aD]=wD;rK[aD+'__'+hD]=wD;
      const fH=f.score?.fulltime?.home??gH,fA=f.score?.fulltime?.away??gA;
      rS[hD+'__'+aD]={h:fH,a:fA};rS[aD+'__'+hD]={h:fA,a:fH};
    }
  });
  const rQ=qualifiers(rG),ko={},ks={};
  ['R32','R16','QF','SF','FINAL'].forEach(rnd=>KO.filter(m=>m.r===rnd).forEach(m=>{
    const t1=rt(m.t1,rQ,ko),t2=rt(m.t2,rQ,ko),k=t1+'__'+t2;
    if(rK[k]){ko[m.id]=rK[k];ks[m.id]=rS[k]}
  }));
  return{rG,rK:ko,rS:ks,n:fx.length,gn:Object.values(rG).reduce((n,g)=>n+Object.keys(g).length,0)};
}

const MatchCard=({m,tip,real,onH,onA,locked})=>{
  const done=tip.h!=null&&tip.h!==''&&tip.a!=null&&tip.a!=='';
  const res=done?(+tip.h>+tip.a?'home':+tip.h<+tip.a?'away':'draw'):null;

    </div>
    <div style={{color:T.textMuted,fontSize:10,fontWeight:700,letterSpacing:3,marginBottom:8,textTransform:'uppercase'}}>⚽ Gruppen</div>
    <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
      {Object.keys(GRP).map(g=><button key={g} onClick={()=>setVGrp(g)} style={{width:34,height:34,borderRadius:8,border:'1px solid '+(vGrp===g?T.goldText:T.border),background:vGrp===g?T.goldText:T.surface,color:vGrp===g?'#060c18':T.textDim,fontWeight:700,fontSize:13,cursor:'pointer'}}>{g}</button>)}
    </div>
    <Standings group={vGrp} st={vSt}/>
    {[1,2,3].map(md=>(
      <div key={md} style={{marginBottom:10}}>
        <div style={{color:T.textMuted,fontSize:10,fontWeight:700,letterSpacing:3,marginBottom:6,textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,height:1,background:T.border}}/>SD {md}<div style={{flex:1,height:1,background:T.border}}/>
        </div>
        {vMs.filter(m=>m.md===md).map(m=>{
          const tip=vGT[m.id]||{},real=rG[m.id]||null;
          const done=tip.h!=null&&tip.h!==''&&tip.a!=null&&tip.a!=='';
          const res=done?(+tip.h>+tip.a?'home':+tip.h<+tip.a?'away':'draw'):null;
          const pts=real&&done?mpts(tip,real):null;
          const sched=gs(m.home,m.away);
          return <div key={m.id} style={{background:T.card,borderRadius:12,marginBottom:6,overflow:'hidden',border:'1px solid '+T.border}}>
            <div style={{height:3,background:pts===null?done?T.goldText:T.border:pts===3?T.green:pts===1?T.amber:T.red}}/>
            <div style={{padding:'10px 12px'}}>
              {sched&&<div style={{marginBottom:7}}><DateBadge d={sched.d} t={sched.t+' MESZ'}/></div>}
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{flex:1,textAlign:'right',fontSize:12,fontWeight:700,color:res==='home'?T.goldText:T.text,display:'flex',justifyContent:'flex-end',alignItems:'center',gap:5}}>
                  <Flag c={m.home} s={15}/>{m.home}
                </span>
                <div style={{minWidth:60,textAlign:'center',background:T.surface,borderRadius:8,padding:'5px 8px',fontWeight:800,fontSize:15,color:done?T.goldText:T.textMuted,border:'1px solid '+T.border,flexShrink:0}}>{done?tip.h+':'+tip.a:'–:–'}</div>
                <span style={{flex:1,fontSize:12,fontWeight:700,color:res==='away'?T.goldText:T.text,display:'flex',alignItems:'center',gap:5}}>
                  <Flag c={m.away} s={15}/>{m.away}
                </span>
              </div>
              {real&&done&&pts!==null&&<div style={{marginTop:8,paddingTop:8,borderTop:'1px solid '+T.border,display:'flex',justifyContent:'space-between',fontSize:11}}>
                <span style={{color:T.textDim}}>Ergebnis <b style={{color:T.text}}>{real.h}:{real.a}</b></span>
                <Badge pts={pts} sm/>
              </div>}
            </div>
          </div>;
        })}
      </div>
    ))}
    <div style={{marginTop:20,color:T.goldText,fontWeight:800,fontSize:11,letterSpacing:3,marginBottom:12,textTransform:'uppercase'}}>⚡ K.O.-Tipps</div>
    {KOR.map(round=>{
      const picks=KO.filter(m=>m.r===round.id&&viewTips.koScores?.[m.id]);
      if(!picks.length)return null;
      return <div key={round.id} style={{marginBottom:14}}>
        <div style={{color:T.textMuted,fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:6,textTransform:'uppercase'}}>{round.lbl}</div>
        {picks.map(m=>{
          const s=viewTips.koScores[m.id];
          const rW=rKR?.[m.id],rSc=rKS?.[m.id];
          const sd=s?.h!=null&&s?.h!==''&&s?.a!=null&&s?.a!=='';
          const sp=rSc&&sd?mpts(s,rSc):null;
          const t1=rt(m.t1,vQ,{}),t2=rt(m.t2,vQ,{});
          const aw=sd&&+s.h!==+s.a?(+s.h>+s.a?t1:t2):null;
          const ok=rW&&aw===rW,bad=rW&&aw&&aw!==rW;
          return <div key={m.id} style={{padding:'10px 14px',background:T.card,borderRadius:10,marginBottom:6,border:'1px solid '+(ok?'rgba(46,204,113,.3)':bad?'rgba(231,76,60,.3)':T.border)}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:10,color:T.textMuted,fontWeight:600}}>{m.lbl}</span>
              <DateBadge d={m.d} t={m.t+' MESZ'}/>
            </div>
            {sd&&<div style={{display:'flex',gap:8,alignItems:'center',marginBottom:aw?6:0}}>
              <span style={{flex:1,fontSize:11,color:T.textDim,textAlign:'right',display:'flex',alignItems:'center',justifyContent:'flex-end',gap:4}}>{t1!=='?'&&<Flag c={t1} s={13}/>}{t1}</span>
              <span style={{fontWeight:800,fontSize:14,color:T.goldText,background:T.surface,padding:'2px 10px',borderRadius:6,border:'1px solid '+T.border}}>{s.h}:{s.a}</span>
              <span style={{flex:1,fontSize:11,color:T.textDim,display:'flex',alignItems:'center',gap:4}}>{t2!=='?'&&<Flag c={t2} s={13}/>}{t2}</span>
            </div>}
            {aw&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:11}}>
              <span style={{color:T.textDim,display:'flex',alignItems:'center',gap:4}}>Weiter: {aw!=='?'&&<Flag c={aw} s={13}/>}<b style={{color:ok?T.green:bad?T.red:T.text}}>{aw}</b></span>
              <div style={{display:'flex',gap:4}}>
                {ok&&<Badge pts={RP[m.r]} label="Sieg" sm/>}
                {bad&&<Badge pts={0} label="Sieg" sm/>}
                {sp!==null&&<Badge pts={sp} label="90'" sm/>}
              </div>
            </div>}
          </div>;
        })}
      </div>;
    })}
  </div>;
};

// ── Admin Tab ──
const AdminTab=({apiKey,onSaveKey,onSync,syncing,syncMsg,rGR,rKR,onExport,onImport,me})=>{
  const [key,setKey]=useState(apiKey);
  const [imp,setImp]=useState('');
  const [impMsg,setImpMsg]=useState('');
  const [expCode,setExpCode]=useState('');
  const [copied,setCopied]=useState(false);
  const gC=Object.values(rGR||{}).reduce((n,g)=>n+Object.keys(g).length,0);
  const kC=Object.keys(rKR||{}).length;
  const doExp=()=>{const c=onExport();setExpCode(c);navigator.clipboard.writeText(c).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500)}).catch(()=>{})};
  const doImp=()=>{if(!imp.trim()){setImpMsg('❌ Code eingeben');return}const r=onImport(imp);if(r.ok){setImpMsg('✅ Tipps von „'+r.user+'" importiert');setImp('')}else setImpMsg('❌ '+r.error)};
  const sec={background:T.card,border:'1px solid '+T.border,borderRadius:12,padding:16,marginBottom:12};
  const head=(emoji,title)=><div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:4}}>{emoji} {title}</div>;
  const sub=txt=><div style={{color:T.textDim,fontSize:11,marginBottom:12,lineHeight:1.6}}>{txt}</div>;
  const inp={width:'100%',padding:'11px 14px',borderRadius:8,border:'1px solid '+T.border,background:T.surface,color:T.text,fontSize:14,boxSizing:'border-box',outline:'none',fontFamily:'inherit',marginBottom:8,appearance:'none'};
  const btn=(bg,col,dis)=>({width:'100%',padding:'11px',borderRadius:8,border:'none',fontWeight:700,fontSize:13,cursor:dis?'not-allowed':'pointer',background:dis?T.surface:bg,color:dis?T.textMuted:col,opacity:dis?.6:1});
  return <div>
    <div style={{background:'linear-gradient(135deg,#0a1628,#0e2040)',borderRadius:16,padding:'20px',marginBottom:16,textAlign:'center',border:'1px solid '+T.border}}>
      <div style={{fontSize:32}}>⚙️</div>
      <div style={{color:T.goldText,fontWeight:900,fontSize:17,letterSpacing:2,marginTop:6}}>ADMIN</div>
    </div>
    <div style={sec}>
      {head('📤','Meine Tipps exportieren')}
      {sub('Code für '+me+' generieren → per WhatsApp teilen.')}
      <button onClick={doExp} style={btn(T.goldText,'#060c18')}>
        {copied?'✓ In Zwischenablage kopiert':'📋 Code generieren & kopieren'}
      </button>
      {expCode&&<textarea readOnly value={expCode} rows={3} style={{...inp,fontSize:10,fontFamily:'monospace',resize:'vertical',marginTop:8,marginBottom:0,color:'#6aabe0'}}/>}
    </div>
    <div style={sec}>
      {head('📥','Tipps importieren')}
      {sub('Export-Code einfügen → erscheint in Rangliste & Tipps-Tab.')}
      <textarea placeholder="Code hier einfügen…" value={imp} onChange={e=>setImp(e.target.value)} rows={3} style={{...inp,fontFamily:'monospace',fontSize:11,resize:'vertical'}}/>
      <button onClick={doImp} style={btn('#1a4a8a','#7aaeff')}>📥 Importieren</button>
      {impMsg&&<div style={{marginTop:8,fontSize:12,color:impMsg.startsWith('✅')?T.green:T.red,fontWeight:600}}>{impMsg}</div>}
    </div>
    <div style={sec}>
      {head('🔑','API-Football Key')}
      <div style={{color:T.textDim,fontSize:11,marginBottom:12,lineHeight:1.6}}>Kostenlos auf <a href="https://dashboard.api-football.com/register" target="_blank" rel="noreferrer">api-sports.io</a> registrieren (100 Abfragen/Tag).</div>
      <input type="password" placeholder="Key eingeben…" value={key} onChange={e=>setKey(e.target.value)}
        style={inp} onFocus={e=>e.target.style.borderColor=T.goldText} onBlur={e=>e.target.style.borderColor=T.border}/>
      <button onClick={()=>onSaveKey(key)} style={btn(T.goldText,'#060c18')}>Speichern</button>
    </div>
    <div style={sec}>
      {head('🔄','Ergebnisse synchronisieren')}
      {sub('Gespeichert: '+gC+' Gruppenspiele · '+kC+' K.O.-Spiele')}
      <button onClick={onSync} disabled={syncing||!apiKey} style={btn('#1a4a8a','#7aaeff',syncing||!apiKey)}>
        {syncing?'⏳ Synchronisiere…':'🔄 Jetzt synchronisieren'}
      </button>
      {syncMsg&&<div style={{marginTop:10,padding:'10px 12px',background:syncMsg.startsWith('✅')?T.greenDim:T.redDim,borderRadius:8,fontSize:12,color:syncMsg.startsWith('✅')?T.green:T.red,lineHeight:1.5}}>{syncMsg}</div>}
    </div>
    <div style={{padding:'12px 14px',background:T.surface,border:'1px solid '+T.border,borderRadius:10,fontSize:11,color:T.textDim,lineHeight:2}}>
      <div style={{fontWeight:700,color:T.text,marginBottom:4}}>ℹ️ So funktioniert das Teilen</div>
      1. Tipps abgeben (bis 11. Juni 21:00 MESZ)<br/>
      2. Admin → <b style={{color:T.text}}>Code generieren</b> → per WhatsApp<br/>
      3. Andere → <b style={{color:T.text}}>Importieren</b> → Code einfügen<br/>
      4. Ergebnisse: API-Key + Sync → exportieren<br/>
      5. WM: <b style={{color:T.text}}>11. Juni – 19. Juli 2026 · Alle Zeiten MESZ</b>
    </div>
  </div>;
};

// ── Login ──
const Login=({name,setName,onLogin})=>
  <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 50% 30%,#0d2040 0%,#060c18 70%)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div style={{background:T.card,border:'1px solid '+T.border,borderRadius:20,padding:'40px 28px',maxWidth:360,width:'100%',textAlign:'center',boxShadow:'0 30px 80px rgba(0,0,0,.8)'}}>
      <div style={{fontSize:56,marginBottom:8}}>🏆</div>
      <div style={{color:T.goldText,fontSize:30,fontWeight:900,letterSpacing:4,marginBottom:4}}>WM 2026</div>
      <div style={{color:T.textMuted,fontSize:13,marginBottom:6}}>Familien-Tippspiel</div>
      <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:32,padding:'10px 0'}}>
        <Flag c="USA" s={28}/><Flag c="Kanada" s={28}/><Flag c="Mexiko" s={28}/>
      </div>
      <input placeholder="Dein Name…" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&onLogin()} autoFocus
        style={{width:'100%',padding:'14px 16px',borderRadius:12,border:'2px solid '+T.border,background:T.surface,color:T.text,fontSize:16,boxSizing:'border-box',marginBottom:12,outline:'none',fontFamily:'inherit',transition:'border-color .2s'}}
        onFocus={e=>e.target.style.borderColor=T.goldText} onBlur={e=>e.target.style.borderColor=T.border}/>
      <button onClick={onLogin} disabled={!name.trim()}
        style={{width:'100%',padding:'15px',borderRadius:12,border:'none',background:name.trim()?T.goldText:T.surface,
          color:name.trim()?'#060c18':T.textMuted,fontSize:15,fontWeight:900,cursor:name.trim()?'pointer':'not-allowed',letterSpacing:2,fontFamily:'inherit',transition:'all .2s'}}>
        LOSLEGEN →
      </button>
      <div style={{color:T.textMuted,fontSize:11,marginTop:20,lineHeight:1.7}}>Tipps werden lokal gespeichert.<br/>Admin → Code generieren → teilen → importieren.</div>
    </div>
  </div>;

// ── Main App ──
function App(){
  const [user,setUser]=useState(null);
  const [ni,setNi]=useState('');
  const [tips,setTips]=useState({groupTips:{},koScores:{}});
  const [allUsers,setAllUsers]=useState([]);
  const [allTips,setAllTips]=useState({});
  const [tab,setTab]=useState('groups');
  const [group,setGroup]=useState('A');
  const [koRound,setKoRound]=useState('R32');
  const [viewUser,setViewUser]=useState(null);
  const [viewTips,setViewTips]=useState(null);
  const [rGR,setRGR]=useState({});
  const [rKR,setRKR]=useState({});
  const [rKS,setRKS]=useState({});
  const [apiKey,setApiKey]=useState('');
  const [saving,setSaving]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState('');
  const [locked,setLocked]=useState(isLocked());
  const sv=useRef(null);

  useEffect(()=>{
    const nr=LS.get('wm26_name');
    if(nr?.value){const n=nr.value;setUser(n);const tr=LS.get('wm26_tips_'+n);if(tr?.value)setTips(JSON.parse(tr.value))}
    const ur=LS.get('wm26_users');if(ur?.value)setAllUsers(JSON.parse(ur.value)||[]);
    const gr=LS.get('wm26_rGR');if(gr?.value)setRGR(JSON.parse(gr.value)||{});
    const kr=LS.get('wm26_rKR');if(kr?.value)setRKR(JSON.parse(kr.value)||{});
    const ks=LS.get('wm26_rKS');if(ks?.value)setRKS(JSON.parse(ks.value)||{});
    const ak=LS.get('wm26_apikey');if(ak?.value)setApiKey(ak.value);
    const iv=setInterval(()=>setLocked(isLocked()),60000);
    return()=>clearInterval(iv);
  },[]);
  useEffect(()=>{if(tab==='leaderboard')loadAll()},[tab,allUsers]);

  const loadAll=()=>{
    const r={};
    allUsers.forEach(u=>{const d=LS.get('wm26_tips_'+u);r[u]=d?.value?JSON.parse(d.value):{groupTips:{},koScores:{}}});
    setAllTips(r);
  };
  const doLogin=()=>{
    const n=ni.trim();if(!n)return;
    LS.set('wm26_name',n);setUser(n);
    let list=[];const ur=LS.get('wm26_users');if(ur?.value)list=JSON.parse(ur.value)||[];
    if(!list.includes(n)){list.push(n);LS.set('wm26_users',JSON.stringify(list))}
    setAllUsers([...list]);
    const tr=LS.get('wm26_tips_'+n);if(tr?.value)setTips(JSON.parse(tr.value));
  };
  const save=t=>{
    if(locked)return;
    if(sv.current)clearTimeout(sv.current);
    sv.current=setTimeout(()=>{setSaving(true);LS.set('wm26_tips_'+user,JSON.stringify(t));setSaving(false)},400);
  };
  const updG=(g,mid,side,val)=>{
    if(locked)return;
    const t={...tips,groupTips:{...tips.groupTips,[g]:{...tips.groupTips?.[g],[mid]:{...tips.groupTips?.[g]?.[mid],[side]:val}}}};
    setTips(t);save(t);
  };
  const updKS=(id,side,val)=>{
    if(locked)return;
    const t={...tips,koScores:{...tips.koScores,[id]:{...tips.koScores?.[id],[side]:val}}};
    setTips(t);save(t);
  };
  const exportT=()=>btoa(unescape(encodeURIComponent(JSON.stringify({user,tips,v:1,ts:Date.now()}))));
  const importT=code=>{
    try{
      const p=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
      if(!p.user||!p.tips)throw new Error('Ungültiger Code');
      LS.set('wm26_tips_'+p.user,JSON.stringify(p.tips));
      let list=[];const ur=LS.get('wm26_users');if(ur?.value)list=JSON.parse(ur.value)||[];
      if(!list.includes(p.user)){list.push(p.user);LS.set('wm26_users',JSON.stringify(list))}
      setAllUsers([...list]);loadAll();
      return{ok:true,user:p.user};
    }catch(e){return{ok:false,error:e.message}}
  };
  const doSync=async()=>{
    if(!apiKey){setSyncMsg('❌ API-Key eingeben');return}
    setSyncing(true);setSyncMsg('');
    try{
      const{rG,rK,rS,n,gn}=await syncAPI(apiKey);
      setRGR(rG);setRKR(rK);setRKS(rS);
      LS.set('wm26_rGR',JSON.stringify(rG));LS.set('wm26_rKR',JSON.stringify(rK));LS.set('wm26_rKS',JSON.stringify(rS));
      setSyncMsg('✅ '+n+' Spiele · '+gn+' Gruppen · '+Object.keys(rK).length+' K.O.');
      loadAll();
    }catch(e){setSyncMsg('❌ '+e.message)}
    setSyncing(false);
  };
  const saveKey=k=>{setApiKey(k);LS.set('wm26_apikey',k)};
  const loadView=name=>{
    if(!name){setViewUser(null);setViewTips(null);return}
    setViewUser(name);
    const r=LS.get('wm26_tips_'+name);
    setViewTips(r?.value?JSON.parse(r.value):{groupTips:{},koScores:{}});
  };

  const q=useMemo(()=>qualifiers(tips.groupTips),[tips.groupTips]);
  const gtCount=Object.values(tips.groupTips||{}).reduce((n,g)=>n+Object.values(g||{}).filter(m=>m?.h!=null&&m?.h!==''&&m?.a!=null&&m?.a!=='').length,0);
  const koSC=Object.keys(tips.koScores||{}).filter(id=>{const s=tips.koScores[id];return s?.h!=null&&s?.h!==''&&s?.a!=null&&s?.a!==''}).length;

  const TABS=[['groups','⚽','Gruppen'],['knockout','⚡','K.O.'],['leaderboard','🏅','Rangliste'],['others','👀','Tipps'],['admin','⚙️','Admin']];

  if(!user)return <Login name={ni} setName={setNi} onLogin={doLogin}/>;
  return <div style={{minHeight:'100vh',background:T.bg,color:T.text}}>
    {/* Header */}
    <div style={{background:T.card,borderBottom:'1px solid '+T.border,padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between',height:52,position:'sticky',top:0,zIndex:100,boxShadow:'0 4px 24px rgba(0,0,0,.6)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:20}}>🏆</span>
        <div>
          <div style={{color:T.goldText,fontWeight:900,fontSize:15,letterSpacing:1,lineHeight:1}}>WM 2026</div>
          <div style={{color:T.textMuted,fontSize:9,letterSpacing:2,textTransform:'uppercase'}}>Tippspiel</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {locked&&<div style={{background:T.redDim,borderRadius:20,padding:'3px 10px',fontSize:11,color:T.red,fontWeight:700}}>🔒 Gesperrt</div>}
        {saving&&<div style={{color:T.textMuted,fontSize:11}}>💾</div>}
        <div style={{background:T.surface,border:'1px solid '+T.border,borderRadius:20,padding:'4px 12px',fontSize:12,color:T.textDim,fontWeight:600}}>👤 {user}</div>
      </div>
    </div>
    {/* Tabs */}
    <div className="tab-bar" style={{background:'#080f1e',borderBottom:'1px solid '+T.border}}>
      {TABS.map(([id,icon,lbl])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:'none',padding:'0 14px',height:44,border:'none',background:'none',
          color:tab===id?T.goldText:T.textMuted,fontWeight:tab===id?700:500,fontSize:12,cursor:'pointer',
          borderBottom:'2px solid '+(tab===id?T.goldText:'transparent'),whiteSpace:'nowrap',transition:'color .15s'}}>
          {icon} {lbl}
        </button>
      ))}
    </div>
    {/* Content */}
    <div style={{padding:'14px 14px',paddingBottom:80,maxWidth:640,margin:'0 auto'}}>
      {tab==='groups'&&<GroupsTab group={group} setGroup={setGroup} tips={tips.groupTips} updateTip={updG} gtCount={gtCount} realGR={rGR} locked={locked}/>}
      {tab==='knockout'&&<KOTab koRound={koRound} setKoRound={setKoRound} koScores={tips.koScores||{}} q={q} updateKoScore={updKS} koScoreCount={koSC} rKR={rKR} rKS={rKS} locked={locked}/>}
      {tab==='leaderboard'&&<LeaderboardTab allUsers={allUsers} allTips={allTips} me={user} rGR={rGR} rKR={rKR} rKS={rKS} onView={u=>{loadView(u);setTab('others')}}/>}
      {tab==='others'&&<OthersTab allUsers={allUsers} viewUser={viewUser} viewTips={viewTips} onSelect={loadView} rGR={rGR} rKR={rKR} rKS={rKS}/>}
      {tab==='admin'&&<AdminTab apiKey={apiKey} onSaveKey={saveKey} onSync={doSync} syncing={syncing} syncMsg={syncMsg} rGR={rGR} rKR={rKR} onExport={exportT} onImport={importT} me={user}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
